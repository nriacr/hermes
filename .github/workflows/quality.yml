name: Hermes quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install -r ha-addon/app/requirements.txt -r requirements-dev.txt
      - name: Run quality checks
        run: PYTHON=python RUFF=ruff sh tools/check.sh

  container-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build add-on image
        run: docker build --tag hermes-addon:ci ./ha-addon
