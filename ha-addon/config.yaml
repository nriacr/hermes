name: Hermes
version: "1.0.47"
slug: hermes
description: Amazon, Hepsiburada, Trendyol ve Network ürün fiyatlarını izler; Amazon arama sayfalarını ayrıca takip eder.
url: https://github.com/nriacr/hermes
arch:
  - aarch64
  - armv7
  - amd64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
hassio_api: true
hassio_role: manager
panel_title: Hermes
panel_icon: mdi:tag-heart
options:
  interval_seconds: 60
  request_delay_min_seconds: 3
  request_delay_max_seconds: 8
  pushover_user_key: ""
  pushover_api_token: ""
  public_dashboard_enabled: false
  public_dashboard_token: ""
  products: []
  amazon_search_pages: []
  amazon_search_targets: []
schema:
  interval_seconds: "int(10,86400)"
  request_delay_min_seconds: "int(0,120)"
  request_delay_max_seconds: "int(0,120)"
  pushover_user_key: "str"
  pushover_api_token: "str"
  public_dashboard_enabled: "bool?"
  public_dashboard_token: "str?"
  products:
    - name: "str"
      url: "str"
      target_price: "float"
      check_interval_minutes: "int(1,1440)?"
      notify_once_in_24H: "bool?"
      active: "bool?"
  amazon_search_pages:
    - name: "str"
      search_url: "str"
      search_url_2: "str?"
      max_items_to_scan: "int(1,100)?"
  amazon_search_targets:
    - search_name: "str?"
      product_name: "str"
      target_price: "float"
      notify_once_in_24H: "bool?"
      active: "bool?"
