name: Hermes
version: "2.0.5"
slug: hermes
description: Ürün fiyatlarını, Amazon arama sayfalarını ve Telegram fırsat kanallarını Pushover bildirimiyle takip eder.
url: https://github.com/nriacr/hermes
arch:
  - aarch64
  - armv7
  - amd64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
hassio_api: true
hassio_role: manager
panel_title: Hermes
panel_icon: mdi:tag-heart
options:
  interval_seconds: 60
  request_delay_min_seconds: 3
  request_delay_max_seconds: 8
  pushover_user_key: ""
  pushover_api_token: ""
  public_dashboard_enabled: false
  public_dashboard_token: ""
  telegram_enabled: false
  api_id: ""
  api_hash: ""
  phone_number: ""
  verification_code: ""
  session_name: "telegram_keyword_alert"
  channels:
    - "@yaniyocom"
    - "@firsatz"
    - "@onual_firsat"
    - "@onual_ekstra"
    - "@butcedostu"
    - "@depoindirim"
    - "@uygunfiyatdedektifi"
    - "@tasarrufluharca"
    - "@depourunleri"
    - "@evEkonomi"
    - "@firsatavi"
  keywords: []
  telegram_notify_once_keywords: []
  exclude_keywords: []
  products: []
  amazon_search_pages: []
  amazon_search_targets: []
schema:
  interval_seconds: "int(10,86400)"
  request_delay_min_seconds: "int(0,120)"
  request_delay_max_seconds: "int(0,120)"
  pushover_user_key: "str"
  pushover_api_token: "str"
  public_dashboard_enabled: "bool?"
  public_dashboard_token: "str?"
  telegram_enabled: "bool?"
  api_id: "str?"
  api_hash: "str?"
  phone_number: "str?"
  verification_code: "str?"
  session_name: "str?"
  channels:
    - "str"
  keywords:
    - "str"
  telegram_notify_once_keywords:
    - "str"
  exclude_keywords:
    - "str"
  products:
    - name: "str"
      url: "str"
      target_price: "float"
      check_interval_minutes: "int(1,1440)?"
      notify_once_in_24H: "bool?"
      active: "bool?"
  amazon_search_pages:
    - name: "str"
      search_url: "str"
      search_url_2: "str?"
      max_items_to_scan: "int(1,100)?"
  amazon_search_targets:
    - search_name: "str?"
      product_name: "str"
      target_price: "float"
      notify_once_in_24H: "bool?"
      active: "bool?"
